<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>성인권 교육 강사뱅크</title>
</head>
<body>

<h1>성인권 교육 강사뱅크</h1>

<h2>강사 등록</h2>

<input id="name" placeholder="이름"><br><br>
<input id="phone" placeholder="전화번호"><br><br>
<input id="email" placeholder="이메일"><br><br>
<input id="region" placeholder="지역"><br><br>
<input id="main_topic" placeholder="주요 강의주제"><br><br>
<input id="targets" placeholder="교육대상 예: 부모, 종사자"><br><br>
<input id="types" placeholder="교육유형 예: 강의형, 체험형"><br><br>
<input id="specialties" placeholder="강의분야 예: 성폭력 예방교육"><br><br>
<textarea id="intro" placeholder="소개"></textarea><br><br>

<label><input type="checkbox" id="show_phone"> 연락처 공개</label><br>
<label><input type="checkbox" id="show_email"> 이메일 공개</label><br><br>

<button onclick="submitForm()">등록하기</button>

<hr>

<h2>강사 검색</h2>

<input id="searchKeyword" placeholder="이름, 지역, 주제 검색">
<input id="filterRegion" placeholder="지역 필터">
<input id="filterTarget" placeholder="교육대상 필터">
<input id="filterType" placeholder="교육유형 필터">
<button onclick="loadData()">검색</button>

<ul id="list"></ul>

<hr>

<h2>관리자 로그인</h2>

<input id="adminEmail" placeholder="관리자 이메일"><br><br>
<input id="adminPassword" type="password" placeholder="관리자 비밀번호"><br><br>

<button onclick="adminLogin()">로그인</button>
<button onclick="adminLogout()">로그아웃</button>

<p id="loginStatus">로그인 상태: 미로그인</p>

<hr>

<h2>관리자 페이지</h2>

<button onclick="loadAdmin()">강사 목록 불러오기</button>
<button onclick="downloadCSV()">CSV 다운로드</button>

<ul id="adminList"></ul>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>
const supabaseClient = window.supabase.createClient(
  "https://bvjyvmbdvusbmrjckeuy.supabase.co",
  "sb_publishable_DtORcLUabLDYYVyh62wLHw_W9ZCmSxo"
)

let adminData = []

async function checkLogin() {
  const { data } = await supabaseClient.auth.getSession()
  const user = data.session?.user

  document.getElementById('loginStatus').innerText =
    user ? "로그인 상태: " + user.email : "로그인 상태: 미로그인"

  return !!user
}

async function adminLogin() {
  const email = document.getElementById('adminEmail').value
  const password = document.getElementById('adminPassword').value

  const { error } = await supabaseClient.auth.signInWithPassword({
    email,
    password
  })

  if (error) {
    alert("로그인 실패: " + error.message)
  } else {
    alert("로그인 완료")
    checkLogin()
  }
}

async function adminLogout() {
  await supabaseClient.auth.signOut()
  alert("로그아웃 완료")
  checkLogin()
}

async function submitForm() {
  const { error } = await supabaseClient
    .from('instructors')
    .insert([{
      name: document.getElementById('name').value,
      phone: document.getElementById('phone').value,
      email: document.getElementById('email').value,
      region: document.getElementById('region').value,
      main_topic: document.getElementById('main_topic').value,
      targets: document.getElementById('targets').value.split(',').map(v => v.trim()).filter(Boolean),
      types: document.getElementById('types').value.split(',').map(v => v.trim()).filter(Boolean),
      specialties: document.getElementById('specialties').value.split(',').map(v => v.trim()).filter(Boolean),
      intro: document.getElementById('intro').value,
      show_phone: document.getElementById('show_phone').checked,
      show_email: document.getElementById('show_email').checked,
      show_profile: true,
      public_status: '검토중'
    }])

  if (error) alert("저장 실패: " + error.message)
  else alert("등록 완료")
}

async function loadData() {
  const keyword = document.getElementById('searchKeyword').value
  const region = document.getElementById('filterRegion').value
  const target = document.getElementById('filterTarget').value
  const type = document.getElementById('filterType').value

  const { data, error } = await supabaseClient
    .from('instructors')
    .select('*')
    .eq('public_status', '공개')

  if (error) {
    alert("불러오기 실패: " + error.message)
    return
  }

  const filtered = data.filter(item => {
    const text = [
      item.name,
      item.region,
      item.main_topic,
      item.intro,
      (item.targets || []).join(' '),
      (item.types || []).join(' '),
      (item.specialties || []).join(' ')
    ].join(' ')

    return (
      (!keyword || text.includes(keyword)) &&
      (!region || (item.region || '').includes(region)) &&
      (!target || (item.targets || []).join(' ').includes(target)) &&
      (!type || (item.types || []).join(' ').includes(type))
    )
  })

  const list = document.getElementById('list')
  list.innerHTML = ''

  if (filtered.length === 0) {
    list.innerHTML = '<li>검색 결과가 없습니다.</li>'
    return
  }

  filtered.forEach(item => {
    const li = document.createElement('li')
    li.innerHTML = `
      <strong>${item.name || '-'}</strong> / ${item.region || '-'}<br>
      주요 주제: ${item.main_topic || '-'}<br>
      대상: ${(item.targets || []).join(', ')}<br>
      유형: ${(item.types || []).join(', ')}<br>
      분야: ${(item.specialties || []).join(', ')}<br>
      ${item.show_phone ? '전화: ' + item.phone + '<br>' : ''}
      ${item.show_email ? '이메일: ' + item.email + '<br>' : ''}
      <br>
    `
    list.appendChild(li)
  })
}

async function requireAdmin() {
  const loggedIn = await checkLogin()
  if (!loggedIn) {
    alert("관리자 로그인이 필요합니다.")
    return false
  }
  return true
}

async function loadAdmin() {
  if (!(await requireAdmin())) return

  const { data, error } = await supabaseClient
    .from('instructors')
    .select('*')
    .order('created_at', { ascending: false })

  if (error) {
    alert("관리자 불러오기 실패: " + error.message)
    return
  }

  adminData = data

  const list = document.getElementById('adminList')
  list.innerHTML = ''

  if (!data || data.length === 0) {
    list.innerHTML = '<li>등록된 강사가 없습니다.</li>'
    return
  }

  data.forEach(item => {
    const li = document.createElement('li')

    li.innerHTML = `
      <strong>${item.name || '-'}</strong> / ${item.region || '-'} / 상태: ${item.public_status || '-'}
      <br>
      전화: ${item.phone || '-'} / 이메일: ${item.email || '-'}
      <br>
      주요 주제: ${item.main_topic || '-'}
      <br>
      <button onclick="approve('${item.id}')">승인</button>
      <button onclick="hideInstructor('${item.id}')">비공개</button>
      <button onclick="editInstructor('${item.id}')">수정</button>
      <button onclick="deleteInstructor('${item.id}')">삭제</button>
      <br><br>
    `

    list.appendChild(li)
  })
}

async function approve(id) {
  if (!(await requireAdmin())) return

  const { error } = await supabaseClient
    .from('instructors')
    .update({ public_status: '공개' })
    .eq('id', id)

  if (error) alert("승인 실패: " + error.message)
  else {
    alert("공개 완료")
    loadAdmin()
  }
}

async function hideInstructor(id) {
  if (!(await requireAdmin())) return

  const { error } = await supabaseClient
    .from('instructors')
    .update({ public_status: '비공개' })
    .eq('id', id)

  if (error) alert("비공개 실패: " + error.message)
  else {
    alert("비공개 처리 완료")
    loadAdmin()
  }
}

async function editInstructor(id) {
  if (!(await requireAdmin())) return

  const item = adminData.find(v => v.id === id)
  if (!item) return

  const newName = prompt("이름 수정", item.name || "")
  const newRegion = prompt("지역 수정", item.region || "")
  const newTopic = prompt("주요 강의주제 수정", item.main_topic || "")

  const { error } = await supabaseClient
    .from('instructors')
    .update({
      name: newName,
      region: newRegion,
      main_topic: newTopic
    })
    .eq('id', id)

  if (error) alert("수정 실패: " + error.message)
  else {
    alert("수정 완료")
    loadAdmin()
  }
}

async function deleteInstructor(id) {
  if (!(await requireAdmin())) return
  if (!confirm("정말 삭제하시겠습니까?")) return

  const { error } = await supabaseClient
    .from('instructors')
    .delete()
    .eq('id', id)

  if (error) alert("삭제 실패: " + error.message)
  else {
    alert("삭제 완료")
    loadAdmin()
  }
}

async function downloadCSV() {
  if (!(await requireAdmin())) return

  if (!adminData || adminData.length === 0) {
    alert("먼저 관리자 목록을 불러오세요.")
    return
  }

  const headers = [
    "이름", "전화", "이메일", "지역", "주요강의주제",
    "교육대상", "교육유형", "강의분야", "공개상태"
  ]

  const rows = adminData.map(item => [
    item.name || "",
    item.phone || "",
    item.email || "",
    item.region || "",
    item.main_topic || "",
    (item.targets || []).join(", "),
    (item.types || []).join(", "),
    (item.specialties || []).join(", "),
    item.public_status || ""
  ])

  const csv = [headers, ...rows]
    .map(row => row.map(value => `"${String(value).replaceAll('"', '""')}"`).join(","))
    .join("\n")

  const blob = new Blob(["\uFEFF" + csv], { type: "text/csv;charset=utf-8;" })
  const url = URL.createObjectURL(blob)

  const a = document.createElement("a")
  a.href = url
  a.download = "강사목록.csv"
  a.click()

  URL.revokeObjectURL(url)
}

checkLogin()
</script>

</body>
</html>
