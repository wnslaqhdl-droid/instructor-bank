<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>강사 등록</title>
</head>
<body>

<h2>강사 등록</h2>

<input id="name" placeholder="이름"><br><br>
<input id="phone" placeholder="전화번호"><br><br>
<input id="email" placeholder="이메일"><br><br>
<input id="region" placeholder="지역"><br><br>
<textarea id="intro" placeholder="소개"></textarea><br><br>

<button onclick="submitForm()">등록하기</button>

<hr>

<h2>강사 목록</h2>
<button onclick="loadData()">불러오기</button>
<ul id="list"></ul>

<hr>

<h2>관리자 페이지</h2>
<button onclick="loadAdmin()">강사 목록 불러오기</button>
<ul id="adminList"></ul>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>
const supabaseClient = window.supabase.createClient(
  "https://bvjyvmbdvusbmrjckeuy.supabase.co",
  "sb_publishable_DtORcLUabLDYYVyh62wLHw_W9ZCmSxo"
)

async function submitForm() {
  const { error } = await supabaseClient
    .from('instructors')
    .insert([{
      name: document.getElementById('name').value,
      phone: document.getElementById('phone').value,
      email: document.getElementById('email').value,
      region: document.getElementById('region').value,
      intro: document.getElementById('intro').value,
      public_status: '검토중',
      show_profile: true
    }])

  if (error) {
    alert("저장 실패: " + error.message)
  } else {
    alert("등록 완료")
  }
}

async function loadData() {
  const { data, error } = await supabaseClient
    .from('instructors')
    .select('*')
    .eq('public_status', '공개')

  if (error) {
    alert("불러오기 실패: " + error.message)
    return
  }

  const list = document.getElementById('list')
  list.innerHTML = ''

  if (!data || data.length === 0) {
    list.innerHTML = '<li>공개된 강사가 없습니다.</li>'
    return
  }

  data.forEach(item => {
    const li = document.createElement('li')
    li.innerText = item.name + " / " + item.region
    list.appendChild(li)
  })
}

async function loadAdmin() {
  const { data, error } = await supabaseClient
    .from('instructors')
    .select('*')

  if (error) {
    alert("관리자 불러오기 실패: " + error.message)
    return
  }

  const list = document.getElementById('adminList')
  list.innerHTML = ''

  if (!data || data.length === 0) {
    list.innerHTML = '<li>등록된 강사가 없습니다.</li>'
    return
  }

  data.forEach(item => {
    const li = document.createElement('li')

    li.innerHTML = `
      ${item.name || '-'} / ${item.region || '-'} / 상태: ${item.public_status || '-'}
      <button onclick="approve('${item.id}')">승인</button>
    `

    list.appendChild(li)
  })
}

async function approve(id) {
  const { error } = await supabaseClient
    .from('instructors')
    .update({ public_status: '공개' })
    .eq('id', id)

  if (error) {
    alert("승인 실패: " + error.message)
  } else {
    alert("공개 완료")
    loadAdmin()
  }
}
</script>

</body>
</html>
